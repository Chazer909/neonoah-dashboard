document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

city:0; } to { opacity:1; } }\n    @media (max-width: 768px) {\n      #app-sidebar { transform: translateX(-240px); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); position: fixed; z-index: 70; }\n      #app-sidebar[data-open=\"true\"] { transform: translateX(0) !important; }\n      #main-content { margin-left: 0 !important; }\n      #mobile-topbar { display: flex !important; }\n      #matrix-grid { grid-template-columns: 1fr !important; }\n      #home-stats { grid-template-columns: repeat(2,1fr) !important; }\n      #home-widgets { grid-template-columns: 1fr !important; }\n      #notes-layout { flex-direction: column !important; }\n      #notes-list { width: 100% !important; }\n    }\n    @media (min-width: 769px) {\n      #app-sidebar { transform: translateX(0) !important; transition: none !important; }\n      #main-content { margin-left: 240px !important; }\n      #mobile-topbar { display: none !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<!-- ══════ PIN SCREEN ══════ -->\n<sc-if value=\"{{ showPin }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(16,212,154,0.07) 0%,var(--bg) 55%);padding:20px;\">\n  <div style=\"width:100%;max-width:340px;\">\n    <div style=\"text-align:center;margin-bottom:32px;\">\n      <div style=\"width:62px;height:62px;background:linear-gradient(135deg,#10d49a,#0b7a5a);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 32px rgba(16,212,154,0.28);\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width:30px;height:30px;\"><polygon points=\"12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2\"><\u002Fpolygon><\u002Fsvg>\n      <\u002Fdiv>\n      <h1 style=\"font-size:26px;font-weight:700;color:v  hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:var(--surface);border:1px solid rgba(16,212,154,0.15);border-radius:14px;padding:18px;margin-bottom:18px;\">\n            <input value=\"{{ schedTitle }}\" onchange=\"{{ setSchedTitle }}\" placeholder=\"Event title…\" style=\"width:100%;background:var(--ov04);border:1px solid var(--ov07);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;margin-bottom:10px;\">\n            <div style=\"display:flex;gap:8px;margin-bottom:12px;\">\n              <div style=\"flex:1;\"><label style=\"font-size:11px;color:var(--text5);display:block;margin-bottom:4px;\">Start<\u002Flabel><input type=\"time\" value=\"{{ schedStart }}\" onchange=\"{{ setSchedStart }}\" style=\"width:100%;background:var(--ov04);border:1px solid var(--ov07);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;\"><\u002Fdiv>\n              <div style=\"flex:1;\"><label style=\"font-size:11px;color:var(--text5);display:block;margin-bottom:4px;\">End<\u002Flabel><input type=\"time\" value=\"{{ schedEnd }}\" onchange=\"{{ setSchedEnd }}\" style=\"width:100%;background:var(--ov04);border:1px solid var(--ov07);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;\">\n              <button onclick=\"{{ addSchedEvent }}\" style=\"background:#10d49a;color:#08131f;border-radius:9px;padding:9px 20px;font-weight:600;font-size:13px;transition:background 0.15s;\" style-hover=\"background:#0dba87;\">Add Event<\u002Fbutton>\n              <button onclick=\"{{ closeSchedForm }}\" style=\"background:var(--ov05);color:var(--text2);border-radius:9px;padding:9px 16px;font-size:13px;transition:all 0.15s;\" style-hover=\"background:var(--ov10);\">Cancel<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"background:var(--surface);border:1px solid var(--ov06);border-radius:14px;overflow:hidden;\">\n          <sc-for list=\"{{ schedHours }}\" as=\"hr\" hint-placeholder-count=\"17\">\n            <div style=\"display:flex;min-height:52px;border-bottom:1px solid var(--ov04);\">\n              <div style=\"width:72px;padding:8px 12px;flex-shrink:0;border-right:1px solid var(--ov04);\">\n                <span style=\"font-size:11px;color:{{ hr.timeC }};font-weight:{{ hr.timeW }};\">{{ hr.label }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"flex:1;padding:6px 10px;\">\n                <sc-for list=\"{{ hr.events }}\" as=\"ev\" hint-placeholder-count=\"1\">\n                  <div style=\"background:rgba(16,212,154,0.09);border-left:3px solid #10d49a;border-radius:5px;padding:6px 10px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;\">\n                    <div>\n                      <div style=\"font-size:13px;font-weight:500;color:var(--text);\">{{ ev.title }}<\u002Fdiv>\n                      <div style=\"font-size:11px;color:var(--text4);\">{{ ev.timeStr }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <button onclick=\"{{ ev.del }}\" style=\"background:none;color:var(--text5);border-radius:5px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:color 0.15s;\" style-hover=\"color:#f87171;\">✕<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════ IDEAS ════ -->\n      <sc-if value=\"{{ isIdeas }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"margin-bottom:22px;\">\n          <h2 style=\"font-size:22px;font-weight:700;color:var(--text);\">Ideas<\u002Fh2>\n          <p style=\"color:var(--text4);font-size:13px;margin-top:4px;\">Capture your spark before it fades<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface);border:1px solid rgba(251,191,36,0.14);border-radius:14px;padding:18px;margin-bottom:22px;\">\n          <input value=\"{{ ideaTitle }}\" onchange=\"{{ setIdeaTitle }}\" placeholder=\"💡 Idea title…\" style=\"width:100%;background:var(--ov04);border:1px solid var(--ov07);border-radius:9px;padding:9px 12px;color:var(--text);font-size:14px;margin-bottom:8px;\">\n          <textarea value=\"{{ ideaContent }}\" onchange=\"{{ setIdeaContent }}\" placeholder=\"Describe your idea…\" rows=\"3\" style=\"width:100%;background:var(--ov04);border:1px solid var(--ov07);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;margin-bottom:8px;\"><\u002Ftextarea>\n          <div style=\"display:flex;gap:8px;\">\n            <input value=\"{{ ideaTag }}\" onchange=\"{{ setIdeaTag }}\" placeholder=\"#tag\" style=\"background:var(--ov04);border:1px solid var(--ov07);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;width:100px;\">\n            <button onclick=\"{{ addIdea }}\" style=\"background:#fbbf24;color:#08131f;border-radius:9px;padding:9px 22px;font-weight:600;font-size:13px;transition:all 0.15s;\" style-hover=\"background:#f59e0b;\">Capture<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;\">\n          <sc-for list=\"{{ ideas }}\" as=\"idea\" hint-placeholder-count=\"3\">\n            <div style=\"background:var(--surface);border:1px solid rgba(251,191,36,0.1);border-radius:14px;padding:16px;position:relative;transition:border-color 0.2s;\" style-hover=\"border-color:rgba(251,191,36,0.25);\">\n              <div style=\"font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;padding-right:28px;\">💡 {{ idea.title }}<\u002Fdiv>\n              <sc-if value=\"{{ idea.hasContent }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:13px;color:var(--text4);line-height:1.5;margin-bottom:8px;\">{{ idea.content }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n                <sc-if value=\"{{ idea.hasTag }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"font-size:11px;color:#fbbf24;background:rgba(251,191,36,0.1);padding:2px 8px;border-radius:10px;\">{{ idea.tag }}<\u002Fspan>\n                <\u002Fsc-if>\n                <span style=\"font-size:11px;color:var(--text5);margin-left:auto;\">{{ idea.dateStr }}<\u002Fspan>\n              <\u002Fdiv>\n              <button onclick=\"{{ idea.del }}\" style=\"position:absolute;top:10px;right:10px;background:none;color:var(--text5);border-radius:5px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;transition:color 0.15s;\" style-hover=\"color:#f87171;\">✕<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════ NOTES ════ -->\n      <sc-if value=\"{{ isNotes }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n          <h2 style=\"font-size:22px;font-weight:700;color:var(--text);\">General Notes<\u002Fh2>\n          <button onclick=\"{{ newNote }}\" style=\"background:rgba(16,212,154,0.1);color:#10d49a;border-radius:11px;padding:9px 18px;font-weight:600;font-size:13px;transition:all 0.15s;\" style-hover=\"background:rgba(16,212,154,0.18);\">+ New Note<\u002Fbutton>\n        <\u002Fdiv>\n        <div id=\"notes-layout\" style=\"display:flex;gap:16px;min-height:500px;\">\n          <div id=\"notes-list\" style=\"width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;overflow-y:auto;\">\n            <sc-for list=\"{{ notesList }}\" as=\"n\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ n.click }}\" style=\"border:1px solid {{ n.selBorder }};border-radius:12px;padding:13px;cursor:pointer;transition:all 0.15s;background:{{ n.selBg }};\" style-hover=\"border-color:rgba(16,212,154,0.2);\">\n                <div style=\"font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ n.title }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:var(--text5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ n.preview }}<\u002Fdiv>\n                <div style=\"font-size:10px;color:var(--text6);margin-top:5px;\">{{ n.dateStr }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;gap:10px;\">\n            <sc-if value=\"{{ hasNote }}\" hint-placeholder-val=\"{{ false }}\">\n              <input value=\"{{ noteTitle }}\" onchange=\"{{ setNoteTitle }}\" placeholder=\"Note title…\" style=\"background:var(--surface);border:1px solid var(--ov07);border-radius:11px;padding:12px 16px;color:var(--text);font-size:16px;font-family:'Lora',serif;font-weight:600;\">\n              <textarea value=\"{{ noteContent }}\" onchange=\"{{ setNoteContent }}\" placeholder=\"Start writing…\" style=\"flex:1;background:var(--surface);border:1px solid var(--ov07);border-radius:11px;padding:14px 16px;color:var(--text);font-size:14px;line-height:1.7;resize:none;min-height:360px;\"><\u002Ftextarea>\n              <div style=\"display:flex;gap:8px;\">\n                <button onclick=\"{{ saveNote }}\" style=\"background:#10d49a;color:#08131f;border-radius:10px;padding:10px 22px;font-weight:600;font-size:13px;transition:background 0.15s;\" style-hover=\"background:#0dba87;\">Save Note<\u002Fbutton>\n                <button onclick=\"{{ cancelNote }}\" style=\"background:var(--ov05);color:var(--text3);border-radius:10px;padding:10px 16px;font-size:13px;transition:all 0.15s;\" style-hover=\"background:var(--ov10);\">Cancel<\u002Fbutton>\n                <sc-if value=\"{{ canDelNote }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ delCurrentNote }}\" style=\"background:none;color:var(--text5);border-radius:10px;padding:10px 16px;font-size:13px;margin-left:auto;transition:color 0.15s;\" style-hover=\"color:#f87171;\">Delete<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noNote }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text5);text-align:center;gap:12px;\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width:44px;height:44px;opacity:0.3;\"><path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg>\n                <div style=\"font-size:13px;\">Select a note or create a new one<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════ SETTINGS & SYNC ════ -->\n      <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeInUp 0.3s ease;max-width:560px;\">\n        <div style=\"margin-bottom:26px;\">\n          <h2 style=\"font-size:22px;font-weight:700;color:var(--text);\">Settings &amp; Sync<\u002Fh2>\n          <p style=\"color:var(--text5);font-size:13px;margin-top:4px;\">Connect Supabase to sync data between your laptop and iPhone.<\u002Fp>\n        <\u002Fdiv>\n\n        <!-- Cloud Sync Card -->\n        <div style=\"background:var(--card);border:1px solid rgba(16,212,154,0.14);border-radius:18px;padding:24px;margin-bottom:18px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px;\">\n            <div style=\"width:40px;height:40px;background:linear-gradient(135deg,rgba(16,212,154,0.2),rgba(59,130,246,0.15));border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#10d49a\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width:20px;height:20px;\"><polyline points=\"17 1 21 5 17 9\"><\u002Fpolyline><path d=\"M3 11V9a4 4 0 014-4h14\"><\u002Fpath><polyline points=\"7 23 3 19 7 15\"><\u002Fpolyline><path d=\"M21 13v2a4 4 0 01-4 4H3\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font-size:15px;font-weight:600;color:var(--text);\">Cloud Sync via Supabase<\u002Fdiv>\n              <div style=\"font-size:12px;color:var(--text5);margin-top:2px;\">Free · No subscription needed · Your data only<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ sbConnected }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;gap:6px;background:rgba(16,212,154,0.1);border:1px solid rgba(16,212,154,0.2);border-radius:20px;padding:5px 12px;\">\n                <div style=\"width:7px;height:7px;border-radius:50%;background:{{ syncDot }};\"><\u002Fdiv>\n                <span style=\"font-size:12px;color:#10d49a;font-weight:500;\">{{ syncLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- Setup steps (only when not connected) -->\n          <sc-if value=\"{{ sbNotConnected }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.12);border-radius:12px;padding:16px;margin-bottom:18px;\">\n              <div style=\"font-size:12px;font-weight:600;color:#3b82f6;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.6px;\">Setup (5 minutes, free)<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                <div style=\"display:flex;gap:10px;align-items:flex-start;\">\n                  <span style=\"width:20px;height:20px;background:#3b82f6;border-radius:50%;color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;\">1<\u002Fspan>\n                  <span style=\"font-size:13px;color:var(--text2);\">Go to <strong>supabase.com<\u002Fstrong> → New Project (free tier)<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:10px;align-items:flex-start;\">\n                  <span style=\"width:20px;height:20px;background:#3b82f6;border-radius:50%;color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;\">2<\u002Fspan>\n                  <span style=\"font-size:13px;color:var(--text2);\">Open <strong>SQL Editor<\u002Fstrong> and run:<br><code style=\"background:var(--ov07);padding:3px 7px;border-radius:5px;font-size:11px;display:inline-block;margin-top:4px;color:var(--text);\">create table neonah_data (user_id text primary key, data text, updated_at timestamptz);<\u002Fcode><\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:10px;align-items:flex-start;\">\n                  <span style=\"width:20px;height:20px;background:#3b82f6;border-radius:50%;color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;\">3<\u002Fspan>\n                  <span style=\"font-size:13px;color:var(--text2);\">Go to <strong>Project Settings → API<\u002Fstrong> and copy your URL + anon key below.<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- Credentials form -->\n          <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:16px;\">\n            <div>\n              <label style=\"font-size:11px;color:var(--text5);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:5px;\">Supabase Project URL<\u002Flabel>\n              <input value=\"{{ sbFormUrl }}\" onchange=\"{{ setSbUrl }}\" placeholder=\"https:\u002F\u002Fxxxxxxxxxxxx.supabase.co\" style=\"width:100%;background:var(--ov04);border:1px solid var(--ov07);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"font-size:11px;color:var(--text5);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:5px;\">Anon \u002F Public Key<\u002Flabel>\n              <input value=\"{{ sbFormKey }}\" onchange=\"{{ setSbKey }}\" placeholder=\"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9…\" type=\"password\" style=\"width:100%;background:var(--ov04);border:1px solid var(--ov07);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"font-size:11px;color:var(--text5);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:5px;\">Your User ID (any unique name)<\u002Flabel>\n              <input value=\"{{ sbFormUid }}\" onchange=\"{{ setSbUid }}\" placeholder=\"noah\" style=\"width:100%;background:var(--ov04);border:1px solid var(--ov07);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:center;\">\n            <button onclick=\"{{ sbSave }}\" style=\"background:var(--accent);color:#060e1c;border-radius:11px;padding:11px 24px;font-weight:700;font-size:14px;transition:opacity 0.15s;\" style-hover=\"opacity:0.85;\">{{ sbConnectBtn }}<\u002Fbutton>\n            <sc-if value=\"{{ sbConnected }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ sbSync }}\" style=\"background:rgba(16,212,154,0.1);color:#10d49a;border-radius:11px;padding:11px 18px;font-size:13px;font-weight:600;transition:all 0.15s;\" style-hover=\"background:rgba(16,212,154,0.2);\">↻ Sync Now<\u002Fbutton>\n              <button onclick=\"{{ sbDisconnect }}\" style=\"background:none;color:var(--text5);border-radius:11px;padding:11px 14px;font-size:13px;transition:color 0.15s;margin-left:auto;\" style-hover=\"color:#f87171;\">Disconnect<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasSyncMsg }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:12px;font-size:12px;color:{{ syncDot }};padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:8px;\">{{ syncMsg }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- How sync works -->\n        <div style=\"background:var(--card);border:1px solid var(--ov07);border-radius:14px;padding:20px;\">\n          <div style=\"font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;\">How it works<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;\">\n            <div style=\"display:flex;gap:10px;align-items:flex-start;\"><span style=\"color:#10d49a;font-size:14px;flex-shrink:0;margin-top:1px;\">✓<\u002Fspan><span style=\"font-size:13px;color:var(--text5);\">Every change auto-saves to Supabase cloud instantly<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;align-items:flex-start;\"><span style=\"color:#10d49a;font-size:14px;flex-shrink:0;margin-top:1px;\">✓<\u002Fspan><span style=\"font-size:13px;color:var(--text5);\">Open dashboard on any device → data loads automatically<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;align-items:flex-start;\"><span style=\"color:#10d49a;font-size:14px;flex-shrink:0;margin-top:1px;\">✓<\u002Fspan><span style=\"font-size:13px;color:var(--text5);\">Host the file on Netlify Drop (free) to open it on your iPhone<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;align-items:flex-start;\"><span style=\"color:#fbbf24;font-size:14px;flex-shrink:0;margin-top:1px;\">⚠<\u002Fspan><span style=\"font-size:13px;color:var(--text5);\">Last-write wins — avoid editing on both devices at the exact same time<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text\u002Fx-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  CURRENCIES = {KIP:{sym:'₭',dec:0},USD:{sym:'$',dec:2},THB:{sym:'฿',dec:2},KRW:{sym:'₩',dec:0},CNY:{sym:'¥',dec:2},VND:{sym:'₫',dec:0}};\n  money(n){ const c=this.CURRENCIES[this.state.finCurrency]||{sym:'$',dec:2}; return c.sym+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:c.dec,maximumFractionDigits:c.dec}); }\n  INC_META = {Salary:{icon:'💼',color:'#10d49a'},Freelance:{icon:'💻',color:'#3b82f6'},Investment:{icon:'📈',color:'#a78bfa'},Business:{icon:'🏢',color:'#fb923c'},Gift:{icon:'🎁',color:'#f472b6'},Bonus:{icon:'⭐',color:'#fbbf24'},Other:{icon:'🔖',color:'var(--text2)'}};\n  EXP_META = {Food:{icon:'🍔',color:'#10d49a'},Drinks:{icon:'🥤',color:'#38bdf8'},Gas:{icon:'⛽',color:'#3b82f6'},Travel:{icon:'✈️',color:'#a78bfa'},Party:{icon:'🎉',color:'#f472b6'},Sport:{icon:'🏀',color:'#fb923c'},Clothes:{icon:'👕',color:'#fbbf24'},Supply:{icon:'📦',color:'#22d3ee'},Housing:{icon:'🏠',color:'#818cf8'},Health:{icon:'💊',color:'#34d399'},Bills:{icon:'🧾',color:'#f87171'},Entertainment:{icon:'🎬',color:'#c084fc'},Other:{icon:'🔖',color:'var(--text2)'}};\n  INCOME_CATS = ['Salary','Freelance','Investment','Business','Gift','Bonus','Other'];\n  EXPENSE_CATS = ['Food','Drinks','Gas','Travel','Party','Sport','Clothes','Supply','Housing','Health','Bills','Entertainment','Other'];\n\n  \u002F\u002F ── Unified tasks: Eisenhower quadrants drive the Time Matrix; one task list powers both To-Do and Matrix ──\n  QCFG = [\n    {key:'q1',label:'Urgent + Important',sub:'DO FIRST',accent:'#f87171',badge:'Do First',bg:'rgba(248,113,113,0.14)'},\n    {key:'q2',label:'Important · Not Urgent',sub:'SCHEDULE',accent:'#10d49a',badge:'Schedule',bg:'rgba(16,212,154,0.14)'},\n    {key:'q3',label:'Urgent · Not Important',sub:'DELEGATE',accent:'#fb923c',badge:'Delegate',bg:'rgba(251,146,60,0.14)'},\n    {key:'q4',label:'Not Urgent · Not Important',sub:'LATER',accent:'var(--text3)',badge:'Later',bg:'var(--ov06)'},\n  ];\n  STATUSES = [\n    {key:'not_started',label:'Not Started',color:'var(--text3)'},\n    {key:'in_progress',label:'In Progress',color:'#3b82f6'},\n    {key:'in_review',label:'In Review',color:'#a78bfa'},\n    {key:'complete',label:'Complete',color:'#10d49a'},\n    {key:'on_hold',label:'On Hold',color:'#fbbf24'},\n    {key:'done',label:'Done (Archive)',color:'var(--text4)'},\n  ];\n  qMeta(q){ return this.QCFG.find(x=>x.key===q)||this.QCFG[1]; }\n  stMeta(k){ return this.STATUSES.find(x=>x.key===k)||this.STATUSES[0]; }\n\n  \u002F\u002F ── English focus: IELTS + Cybersecurity Sales Engineering \u002F advanced business & technology ──\n  PHRASE_CATS = ['IELTS Academic','Cyber Sales Engineering','Business Email','General'];\n  SEED_VOCAB = [\n    {w:'mitigate',t:'reduce the severity of a risk',e:'These controls mitigate the risk of a breach.'},\n    {w:'remediation',t:'fixing a vulnerability or fault',e:'The team prioritised remediation of critical findings.'},\n    {w:'attack surface',t:'all the points where a system can be attacked',e:'Reducing the attack surface lowers exposure.'},\n    {w:'stakeholder',t:'a person with interest in a project',e:'We briefed every stakeholder before go-live.'},\n    {w:'value proposition',t:'the benefit a product promises to deliver',e:'Our value proposition is faster threat detection.'},\n    {w:'scalable',t:'able to grow without losing performance',e:'The architecture is scalable to thousands of endpoints.'},\n    {w:'compliance',t:'meeting rules and regulations',e:'We help clients achieve regulatory compliance.'},\n    {w:'substantiate',t:'support a claim with evidence (IELTS)',e:'You must substantiate your opinion with examples.'},\n    {w:'consequently',t:'as a result (IELTS linking word)',e:'Demand rose; consequently, prices increased.'},\n    {w:'nevertheless',t:'in spite of that (IELTS linking word)',e:'It is costly; nevertheless, it is worthwhile.'},\n  ];\n  SEED_PHRASES = [\n    {p:'To what extent do you agree or disagree?',t:'Common IELTS Writing Task 2 prompt.',c:'IELTS Academic'},\n    {p:'This essay will argue that…',t:'Thesis statement opener for IELTS writing.',c:'IELTS Academic'},\n    {p:'A significant proportion of…',t:'Academic phrasing for \"a lot of\".',c:'IELTS Academic'},\n    {p:'Let me walk you through how this works.',t:'Open a product demo smoothly.',c:'Cyber Sales Engineering'},\n    {p:'What does your current security posture look like?',t:'Discovery question for a prospect.',c:'Cyber Sales Engineering'},\n    {p:'This directly addresses the risk you mentioned.',t:'Tie a feature to the customer pain point.',c:'Cyber Sales Engineering'},\n    {p:'Happy to set up a proof of concept for your team.',t:'Propose a next step in the sales cycle.',c:'Cyber Sales Engineering'},\n    {p:'Please find the proposal attached for your review.',t:'Formal email closing line.',c:'Business Email'},\n    {p:'I wanted to circle back on our last conversation.',t:'Polite follow-up opener.',c:'Business Email'},\n    {p:'Looking forward to your thoughts.',t:'Professional sign-off.',c:'Business Email'},\n  ];\n  seedLanguage(lang){\n    lang={vocabulary:lang.vocabulary||[],phrases:lang.phrases||[],progress:lang.progress||{xp:0,lastStudied:null},_seeded:lang._seeded};\n    if(!lang._seeded){\n      const today=new Date().toISOString().split('T')[0];\n      this.SEED_VOCAB.forEach((v,i)=>{const id='seed_v_'+i; if(!lang.vocabulary.some(x=>x.id===id)) lang.vocabulary.push({id,word:v.w,translation:v.t,example:v.e,mastered:false,reviewCount:0,nextReview:today});});\n      this.SEED_PHRASES.forEach((p,i)=>{const id='seed_p_'+i; if(!lang.phrases.some(x=>x.id===id)) lang.phrases.push({id,phrase:p.p,translation:p.t,category:p.c});});\n      lang._seeded=true;\n    }\n    return lang;\n  }\n\n  \u002F\u002F Normalize\u002Fmigrate data shape: fold legacy todos (todo\u002Fdoing\u002Fdone) + legacy matrix buckets into one task model.\n  \u002F\u002F Idempotent and safe to run after every load\u002Fsync. Clears data.matrix once folded so tasks aren't resurrected.\n  normalize(data){\n    const now=new Date().toISOString();\n    const legSt={todo:'not_started',doing:'in_progress',done:'complete'};\n    const legQ={high:'q1',medium:'q2',low:'q4'};\n    const STK=['not_started','in_progress','in_review','complete','on_hold','done'];\n    let tasks=(data.todos||[]).map(t=>{\n      const status=STK.includes(t.status)?t.status:(legSt[t.status]||'not_started');\n      const quadrant=['q1','q2','q3','q4'].includes(t.quadrant)?t.quadrant:(legQ[t.priority]||'q2');\n      return {id:t.id,title:t.title,detail:t.detail||'',quadrant,start:t.start||'',end:t.end||t.due||'',status,created:t.created||now,updated:t.updated||t.created||now};\n    });\n    const m=data.matrix||{};\n    let folded=false;\n    ['q1','q2','q3','q4'].forEach(q=>{(m[q]||[]).forEach(it=>{\n      const id='m_'+q+'_'+it.id;\n      if(!tasks.some(t=>t.id===id)){ tasks.push({id,title:it.title,detail:'',quadrant:q,due:'',status:it.done?'complete':'not_started',created:now,updated:now}); folded=true; }\n    });});\n    data.todos=tasks;\n    if(folded || (m.q1&&m.q1.length)||(m.q2&&m.q2.length)||(m.q3&&m.q3.length)||(m.q4&&m.q4.length)) data.matrix={q1:[],q2:[],q3:[],q4:[]};\n    \u002F\u002F Journal: tag legacy freeform entries\n    data.journal=(data.journal||[]).map(e=>e.type?e:{...e,type:'free'});\n    \u002F\u002F Language: seed starter content (dedup by deterministic id)\n    data.language=this.seedLanguage(data.language||{vocabulary:[],phrases:[],progress:{xp:0,lastStudied:null}});\n    return data;\n  }\n  monthKey(iso){ return (iso||'').slice(0,7); }\n  fmtMonth(ym){ const p=ym.split('-'); return new Date(parseInt(p[0]),parseInt(p[1])-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); }\n  breakdown(txs){\n    const exp=txs.filter(t=>t.type==='expense');\n    const total=exp.reduce((a,t)=>a+t.amount,0);\n    const byCat={};\n    exp.forEach(t=>{byCat[t.category]=(byCat[t.category]||0)+t.amount;});\n    const rows=Object.keys(byCat).map(c=>({name:c,amount:byCat[c],icon:(this.EXP_META[c]||{}).icon||'🔖',color:(this.EXP_META[c]||{}).color||'var(--text2)',pct:total>0?byCat[c]\u002Ftotal*100:0})).sort((a,b)=>b.amount-a.amount);\n    const max=rows.length?rows[0].amount:0;\n    return rows.map(r=>({...r,amountStr:this.money(r.amount),pctStr:Math.round(r.pct)+'%',barW:(max>0?r.amount\u002Fmax*100:0).toFixed(1)+'%'}));\n  }\n  \u002F\u002F Daily words geared to IELTS academic English + cybersecurity sales engineering \u002F business technology.\n  DAILY_WORDS = [\n    {w:'Mitigate',d:'To make a risk, threat, or problem less severe.',e:'These controls mitigate the risk of a data breach.'},\n    {w:'Leverage',d:'To use something to maximum advantage.',e:'We leverage automation to scale our security operations.'},\n    {w:'Scalable',d:'Able to grow or expand without losing performance.',e:'The platform offers a scalable solution for enterprise clients.'},\n    {w:'Posture',d:'An organisation\\'s overall security strength and readiness.',e:'A regular audit strengthens your security posture.'},\n    {w:'Remediation',d:'The act of correcting a fault or vulnerability.',e:'The report outlines clear remediation steps for each finding.'},\n    {w:'Stakeholder',d:'A person with an interest or concern in a project.',e:'We aligned every stakeholder before the deployment.'},\n    {w:'Proactive',d:'Acting in advance to deal with an expected difficulty.',e:'A proactive approach prevents incidents before they occur.'},\n    {w:'Compliance',d:'Meeting required rules, standards, or regulations.',e:'The solution ensures compliance with ISO 27001.'},\n    {w:'Resilient',d:'Able to recover quickly from disruption or attack.',e:'A resilient network withstands and recovers from outages.'},\n    {w:'Articulate',d:'To express an idea clearly and effectively.',e:'She articulated the value proposition to the board.'},\n    {w:'Comprehensive',d:'Complete and including everything necessary.',e:'We provide comprehensive coverage across all endpoints.'},\n    {w:'Streamline',d:'To make a process simpler and more efficient.',e:'Our tool streamlines the incident response workflow.'},\n    {w:'Substantiate',d:'To provide evidence to support a claim (IELTS Writing).',e:'Candidates must substantiate their arguments with examples.'},\n    {w:'Facilitate',d:'To make an action or process easier.',e:'The dashboard facilitates faster decision-making.'},\n  ];\n\n  state = {\n    authenticated: false,\n    pinStep: 'enter',\n    pinInput: '',\n    confirmPin: '',\n    pinError: '',\n    sidebarOpen: false,\n    currentView: 'home',\n    theme: 'dark',\n    sbFormUrl: '', sbFormKey: '', sbFormUid: 'noah', syncStatus: 'idle', syncMsg: '', sbConnected: false,\n    data: {\n      todos: [], matrix: {q1:[],q2:[],q3:[],q4:[]},\n      habits: [], mood: [], journal: [],\n      finance: {transactions:[]},\n      language: {vocabulary:[],phrases:[],progress:{xp:0,lastStudied:null}},\n      books: [], vision: [], bucket: [], schedule: [], ideas: [], notes: [],\n    },\n    todoInput: '', todoQuad: 'q2', todoStart: '', todoEnd: '', todoDetail: '', todoFilter: 'all',\n    editId: null, eTitle: '', eDetail: '', eQuad: 'q2', eStart: '', eEnd: '',\n    mInputs: {q1:'',q2:'',q3:'',q4:''},\n    habitInput: '', habitColor: '#10d49a',\n    moodPick: null, moodNote: '',\n    jView: 'list', jType: 'daily', jTitle: '', jContent: '', jSelId: null,\n    jDate: '', jG:['','',''], jW:['','',''], jA:['','',''], jH:['','',''], jB:['','',''],\n    finType: 'expense', finAmount: '', finCategory: 'Food', finNote: '', finFilter: 'all', finShowForm: false,\n    finTab: 'overview', finMonth: new Date().toISOString().slice(0,7), finCurrency: 'KIP',\n    langTab: 'daily', vocabWord: '', vocabTrans: '', vocabEx: '',\n    phraseText: '', phraseTrans: '', phraseCat: 'IELTS Academic',\n    flashIdx: 0, flashFlipped: false,\n    bookFilter: 'all', bookShowForm: false, bookTitle: '', bookAuthor: '', bookStatus: 'to-read',\n    visionShowForm: false, visionTitle: '', visionDesc: '', visionImage: null,\n    bucketInput: '', bucketCat: 'Travel', bucketFilter: 'all',\n    schedDate: new Date().toISOString().split('T')[0],\n    schedTitle: '', schedStart: '09:00', schedEnd: '10:00', schedShowForm: false,\n    ideaTitle: '', ideaContent: '', ideaTag: '',\n    selNoteId: null, noteTitle: '', noteContent: '', noteIsNew: false,\n  };\n\n  applyTheme(t){ try{ document.documentElement.setAttribute('data-theme',t); }catch(e){} }\n  toggleTheme(){ const t=this.state.theme==='dark'?'light':'dark'; this.applyTheme(t); try{localStorage.setItem('nn_theme',t);}catch(e){} this.setState({theme:t}); }\n  componentDidMount() {\n    try { const th=localStorage.getItem('nn_theme')||'dark'; this.applyTheme(th); this.setState({theme:th}); } catch(e){}\n    try {\n      const pin = localStorage.getItem('nn_pin');\n      const raw = localStorage.getItem('nn_data');\n      let data = this.state.data;\n      if (raw) {\n        const saved = JSON.parse(raw);\n        data = {};\n        Object.keys(this.state.data).forEach(k => { data[k] = saved[k] !== undefined ? saved[k] : this.state.data[k]; });\n      }\n      data = this.normalize(data);\n      try { localStorage.setItem('nn_data', JSON.stringify(data)); } catch(e) {}\n      \u002F\u002F Load saved SB creds\n      const sbUrl = localStorage.getItem('nn_sb_url')||'';\n      const sbKey = localStorage.getItem('nn_sb_key')||'';\n      const sbUid = localStorage.getItem('nn_sb_uid')||'noah';\n      const sbConnected = !!(sbUrl && sbKey);\n      this.setState({pinStep: pin ? 'enter' : 'set', data, sbFormUrl:sbUrl, sbFormKey:sbKey, sbFormUid:sbUid, sbConnected});\n      \u002F\u002F Auto-pull on load if connected\n      if (sbConnected) setTimeout(() => this.sbPull(sbUrl, sbKey, sbUid, data), 800);\n    } catch(e) { console.warn('Load error:', e); }\n  }\n\n  save(data) {\n    try { localStorage.setItem('nn_data', JSON.stringify(data)); } catch(e) {}\n    \u002F\u002F Auto-push if connected\n    const url=localStorage.getItem('nn_sb_url');\n    const key=localStorage.getItem('nn_sb_key');\n    const uid=localStorage.getItem('nn_sb_uid')||'noah';\n    if(url&&key) this.sbPush(url,key,uid,data);\n  }\n\n  \u002F\u002F ── Supabase sync ──\n  sbHeaders(key){ return {'apikey':key,'Authorization':'Bearer '+key,'Content-Type':'application\u002Fjson','Prefer':'resolution=merge-duplicates'}; }\n\n  async sbPush(url,key,uid,data){\n    try{\n      this.setState({syncStatus:'syncing',syncMsg:'Saving to cloud…'});\n      const res=await fetch(url+'\u002Frest\u002Fv1\u002Fneonah_data',{method:'POST',headers:this.sbHeaders(key),body:JSON.stringify({user_id:uid,data:JSON.stringify(data),updated_at:new Date().toISOString()})});\n      if(res.ok||res.status===201||res.status===200){this.setState({syncStatus:'ok',syncMsg:'Synced ✓ '+new Date().toLocaleTimeString()});}\n      else{const t=await res.text();this.setState({syncStatus:'err',syncMsg:'Push error: '+res.status});}\n    }catch(e){this.setState({syncStatus:'err',syncMsg:'Network error: '+e.message});}\n  }\n\n  async sbPull(url,key,uid,localData){\n    try{\n      this.setState({syncStatus:'syncing',syncMsg:'Loading from cloud…'});\n      const res=await fetch(url+'\u002Frest\u002Fv1\u002Fneonah_data?user_id=eq.'+encodeURIComponent(uid)+'&select=data,updated_at',{method:'GET',headers:{...this.sbHeaders(key),'Accept':'application\u002Fjson'}});\n      if(!res.ok){this.setState({syncStatus:'err',syncMsg:'Pull error: '+res.status});return;}\n      const rows=await res.json();\n      if(rows&&rows.length>0){\n        const remote=JSON.parse(rows[0].data);\n        const merged={};\n        const base=localData||this.state.data;\n        Object.keys(base).forEach(k=>{merged[k]=remote[k]!==undefined?remote[k]:base[k];});\n        this.normalize(merged);\n        this.save(merged);\n        try{localStorage.setItem('nn_data',JSON.stringify(merged));}catch(e){}\n        this.setState({data:merged,syncStatus:'ok',syncMsg:'Pulled ✓ '+new Date().toLocaleTimeString()});\n      } else {\n        \u002F\u002F No remote data yet — push local\n        this.sbPush(url,key,uid,localData||this.state.data);\n      }\n    }catch(e){this.setState({syncStatus:'err',syncMsg:'Network: '+e.message});}\n  }\n\n  sbSaveSettings(){\n    const {sbFormUrl,sbFormKey,sbFormUid}=this.state;\n    const url=sbFormUrl.trim().replace(\u002F\\\u002F$\u002F,'');\n    const key=sbFormKey.trim();\n    const uid=sbFormUid.trim()||'noah';\n    if(!url||!key){this.setState({syncMsg:'Enter your Supabase URL and anon key.'});return;}\n    localStorage.setItem('nn_sb_url',url);\n    localStorage.setItem('nn_sb_key',key);\n    localStorage.setItem('nn_sb_uid',uid);\n    this.setState({sbConnected:true,syncStatus:'syncing'});\n    this.sbPull(url,key,uid,this.state.data);\n  }\n\n  sbDisconnect(){\n    localStorage.removeItem('nn_sb_url');\n    localStorage.removeItem('nn_sb_key');\n    this.setState({sbConnected:false,syncStatus:'idle',syncMsg:'',sbFormKey:''});\n  }\n\n  sbManualSync(){\n    const url=localStorage.getItem('nn_sb_url');\n    const key=localStorage.getItem('nn_sb_key');\n    const uid=localStorage.getItem('nn_sb_uid')||'noah';\n    if(url&&key) this.sbPull(url,key,uid,this.state.data);\n  }\n\n  \u002F\u002F PIN\n  pinDigit(d) {\n    const {pinStep, pinInput, confirmPin} = this.state;\n    if (pinStep === 'set') {\n      if (pinInput.length >= 6) return;\n      const np = pinInput + d;\n      this.setState({pinInput: np, pinError: ''});\n      if (np.length === 6) setTimeout(() => this.setState({pinStep:'confirm',confirmPin:'',pinInput:np}), 150);\n    } else if (pinStep === 'confirm') {\n      if (confirmPin.length >= 6) return;\n      const nc = confirmPin + d;\n      this.setState({confirmPin: nc, pinError: ''});\n      if (nc.length === 6) setTimeout(() => this.doSetPin(nc), 150);\n    } else {\n      if (pinInput.length >= 6) return;\n      const np = pinInput + d;\n      this.setState({pinInput: np, pinError: ''});\n      if (np.length === 6) setTimeout(() => this.doVerify(np), 150);\n    }\n  }\n  doSetPin(confirm) {\n    const {pinInput} = this.state;\n    if (pinInput !== confirm) { this.setState({pinError:\"PINs don't match. Try again.\",pinStep:'set',pinInput:'',confirmPin:''}); return; }\n    localStorage.setItem('nn_pin', pinInput);\n    this.setState({authenticated:true,pinInput:'',pinError:''});\n  }\n  doVerify(pin) {\n    const stored = localStorage.getItem('nn_pin');\n    if (pin === stored) { this.setState({authenticated:true,pinInput:'',pinError:''}); }\n    else { this.setState({pinError:'Incorrect PIN. Try again.',pinInput:''}); }\n  }\n  pinBack() {\n    const {pinStep,pinInput,confirmPin} = this.state;\n    if (pinStep==='confirm') this.setState({confirmPin:confirmPin.slice(0,-1)});\n    else this.setState({pinInput:pinInput.slice(0,-1)});\n  }\n\n  nav(view) { this.setState({currentView:view,sidebarOpen:false}); }\n  lock() { this.setState({authenticated:false,pinInput:'',pinStep:'enter',pinError:''}); }\n\n  \u002F\u002F Tasks (unified: powers both To-Do list and Time Matrix)\n  addTodo() {\n    const {todoInput, todoQuad, todoStart, todoEnd, todoDetail, data} = this.state;\n    if (!todoInput.trim()) return;\n    const now=new Date().toISOString();\n    const task={id:Date.now()+'',title:todoInput.trim(),detail:(todoDetail||'').trim(),quadrant:todoQuad||'q2',start:todoStart||'',end:todoEnd||'',status:'not_started',created:now,updated:now};\n    const nd = {...data, todos:[...data.todos, task]};\n    this.setState({data:nd,todoInput:'',todoDetail:'',todoStart:'',todoEnd:''}); this.save(nd);\n  }\n  \u002F\u002F Edit an existing task in place\n  startEdit(id) {\n    const t=this.state.data.todos.find(t=>t.id===id); if(!t)return;\n    this.setState({editId:id,eTitle:t.title||'',eDetail:t.detail||'',eQuad:t.quadrant||'q2',eStart:t.start||'',eEnd:t.end||''});\n  }\n  saveEdit() {\n    const s=this.state; if(!s.editId)return;\n    if(!s.eTitle.trim()){ this.setState({editId:null}); return; }\n    const todos=s.data.todos.map(t=>t.id===s.editId?{...t,title:s.eTitle.trim(),detail:s.eDetail.trim(),quadrant:s.eQuad,start:s.eStart||'',end:s.eEnd||'',updated:new Date().toISOString()}:t);\n    const nd={...s.data,todos}; this.setState({data:nd,editId:null}); this.save(nd);\n  }\n  cancelEdit(){ this.setState({editId:null}); }\n  setTaskStatus(id,status) {\n    const todos=this.state.data.todos.map(t=>t.id===id?{...t,status,updated:new Date().toISOString()}:t);\n    const nd={...this.state.data,todos}; this.setState({data:nd}); this.save(nd);\n  }\n  setTaskQuad(id,q) {\n    const todos=this.state.data.todos.map(t=>t.id===id?{...t,quadrant:q,updated:new Date().toISOString()}:t);\n    const nd={...this.state.data,todos}; this.setState({data:nd}); this.save(nd);\n  }\n  delTodo(id) {\n    const todos=this.state.data.todos.filter(t=>t.id!==id);\n    const nd={...this.state.data,todos}; this.setState({data:nd}); this.save(nd);\n  }\n\n  \u002F\u002F Matrix quick-add \u002F toggle operate on the same task list\n  addMatrix(q) {\n    const {mInputs,data} = this.state;\n    if (!(mInputs[q]||'').trim()) return;\n    const now=new Date().toISOString();\n    const task={id:Date.now()+'',title:mInputs[q].trim(),detail:'',quadrant:q,due:'',status:'not_started',created:now,updated:now};\n    const nd={...data,todos:[...data.todos, task]};\n    this.setState({data:nd,mInputs:{...mInputs,[q]:''}}); this.save(nd);\n  }\n  toggleMatrixTask(id) {\n    const todos=this.state.data.todos.map(t=>t.id===id?{...t,status:t.status==='complete'?'not_started':'complete',updated:new Date().toISOString()}:t);\n    const nd={...this.state.data,todos}; this.setState({data:nd}); this.save(nd);\n  }\n\n  \u002F\u002F Habits\n  addHabit() {\n    const {habitInput,habitColor,data} = this.state;\n    if (!habitInput.trim()) return;\n    const nd={...data,habits:[...data.habits,{id:Date.now()+'',name:habitInput.trim(),color:habitColor,completions:[]}]};\n    this.setState({data:nd,habitInput:''}); this.save(nd);\n  }\n  toggleHabit(id) {\n    const today=new Date().toISOString().split('T')[0];\n    const habits=this.state.data.habits.map(h=>{\n      if(h.id!==id)return h;\n      const cs=h.completions||[];\n      return {...h,completions:cs.includes(today)?cs.filter(d=>d!==today):[...cs,today]};\n    });\n    const nd={...this.state.data,habits}; this.setState({data:nd}); this.save(nd);\n  }\n  delHabit(id) {\n    const habits=this.state.data.habits.filter(h=>h.id!==id);\n    const nd={...this.state.data,habits}; this.setState({data:nd}); this.save(nd);\n  }\n  streak(cs) {\n    if(!cs||!cs.length)return 0;\n    const sorted=[...cs].sort((a,b)=>b.localeCompare(a));\n    const today=new Date().toISOString().split('T')[0];\n    let n=0,d=new Date();\n    if(!sorted.includes(today))d.setDate(d.getDate()-1);\n    while(true){const ds=d.toISOString().split('T')[0];if(sorted.includes(ds)){n++;d.setDate(d.getDate()-1);}else break;}\n    return n;\n  }\n\n  \u002F\u002F Mood\n  logMood() {\n    const {moodPick,moodNote,data} = this.state;\n    if(!moodPick)return;\n    const today=new Date().toISOString().split('T')[0];\n    const EMOJIS=['','😔','😕','😐','😊','😄'];\n    const LABELS=['','Very Low','Low','Neutral','Good','Great'];\n    const mood=[...(data.mood||[]).filter(m=>m.date!==today),{id:Date.now()+'',date:today,value:moodPick,emoji:EMOJIS[moodPick],label:LABELS[moodPick],note:moodNote.trim()}];\n    const nd={...data,mood};\n    this.setState({data:nd,moodPick:null,moodNote:''}); this.save(nd);\n  }\n\n  \u002F\u002F Journal (structured daily template + legacy freeform)\n  setJArr(key,i,val){ const a=[...this.state[key]]; a[i]=val; this.setState({[key]:a}); }\n  jClean(a){ return (a||['','','']).map(x=>(x||'').trim()); }\n  jEmpty(){ return {jG:['','',''],jW:['','',''],jA:['','',''],jH:['','',''],jB:['','','']}; }\n  saveJournal() {\n    const s=this.state, data=s.data, now=new Date().toISOString();\n    if(s.jType==='free'){\n      if(!s.jContent.trim())return;\n      const journal=data.journal.map(e=>e.id===s.jSelId?{...e,title:s.jTitle||e.title,content:s.jContent,updated:now}:e);\n      const nd={...data,journal};\n      this.setState({data:nd,jView:'list',jSelId:null}); this.save(nd); return;\n    }\n    const entry={type:'daily',date:s.jDate||now.split('T')[0],\n      grateful:this.jClean(s.jG),great:this.jClean(s.jW),affirm:this.jClean(s.jA),\n      highlights:this.jClean(s.jH),better:this.jClean(s.jB),updated:now};\n    const hasAny=[entry.grateful,entry.great,entry.affirm,entry.highlights,entry.better].some(a=>a.some(x=>x));\n    if(!hasAny)return;\n    let journal;\n    if(s.jSelId){ journal=data.journal.map(e=>e.id===s.jSelId?{...e,...entry}:e); }\n    else { journal=[{id:Date.now()+'',created:now,...entry},...data.journal]; }\n    const nd={...data,journal};\n    this.setState({data:nd,jView:'list',jSelId:null,...this.jEmpty()}); this.save(nd);\n  }\n  newJEntry(){ this.setState({jView:'editor',jType:'daily',jSelId:null,jDate:new Date().toISOString().split('T')[0],jTitle:'',jContent:'',...this.jEmpty()}); }\n  loadEntry(id){\n    const e=this.state.data.journal.find(e=>e.id===id); if(!e)return null;\n    if(e.type==='daily'){\n      this.setState({jSelId:id,jType:'daily',jDate:e.date,jG:e.grateful||['','',''],jW:e.great||['','',''],jA:e.affirm||['','',''],jH:e.highlights||['','',''],jB:e.better||['','','']});\n    } else {\n      this.setState({jSelId:id,jType:'free',jTitle:e.title||'',jContent:e.content||''});\n    }\n    return e;\n  }\n  openRead(id) { if(this.loadEntry(id)) this.setState({jView:'read'}); }\n  openEdit(id) { if(this.loadEntry(id)) this.setState({jView:'editor'}); }\n  delJournal(id) {\n    const journal=this.state.data.journal.filter(e=>e.id!==id);\n    const nd={...this.state.data,journal};\n    this.setState({data:nd,jView:'list',jSelId:null}); this.save(nd);\n  }\n\n  \u002F\u002F Finance\n  addTx() {\n    const {finType,finAmount,finCategory,finNote,data} = this.state;\n    const amt=parseFloat(finAmount);\n    if(!amt||isNaN(amt))return;\n    const tx={id:Date.now()+'',type:finType,amount:amt,category:finCategory,note:finNote.trim(),date:new Date().toISOString(),currency:this.state.finCurrency};\n    const nd={...data,finance:{transactions:[tx,...(data.finance.transactions||[])]}};\n    this.setState({data:nd,finAmount:'',finNote:'',finShowForm:false}); this.save(nd);\n  }\n  delTx(id) {\n    const transactions=(this.state.data.finance.transactions||[]).filter(t=>t.id!==id);\n    const nd={...this.state.data,finance:{transactions}};\n    this.setState({data:nd}); this.save(nd);\n  }\n\n  \u002F\u002F Language\n  addVocab() {\n    const {vocabWord,vocabTrans,vocabEx,data} = this.state;\n    if(!vocabWord.trim()||!vocabTrans.trim())return;\n    const v={id:Date.now()+'',word:vocabWord.trim(),translation:vocabTrans.trim(),example:vocabEx.trim(),mastered:false,reviewCount:0,nextReview:new Date().toISOString().split('T')[0]};\n    const lang=data.language;\n    const nd={...data,language:{...lang,vocabulary:[...lang.vocabulary,v]}};\n    this.setState({data:nd,vocabWord:'',vocabTrans:'',vocabEx:''}); this.save(nd);\n  }\n  delVocab(id) {\n    const lang=this.state.data.language;\n    const vocabulary=lang.vocabulary.filter(v=>v.id!==id);\n    const nd={...this.state.data,language:{...lang,vocabulary}};\n    this.setState({data:nd}); this.save(nd);\n  }\n  addPhrase() {\n    const {phraseText,phraseTrans,phraseCat,data} = this.state;\n    if(!phraseText.trim()||!phraseTrans.trim())return;\n    const p={id:Date.now()+'',phrase:phraseText.trim(),translation:phraseTrans.trim(),category:phraseCat};\n    const lang=data.language;\n    const nd={...data,language:{...lang,phrases:[...lang.phrases,p]}};\n    this.setState({data:nd,phraseText:'',phraseTrans:''}); this.save(nd);\n  }\n  delPhrase(id) {\n    const lang=this.state.data.language;\n    const phrases=lang.phrases.filter(p=>p.id!==id);\n    const nd={...this.state.data,language:{...lang,phrases}};\n    this.setState({data:nd}); this.save(nd);\n  }\n  markVocab(id,known) {\n    const today=new Date().toISOString().split('T')[0];\n    const lang=this.state.data.language;\n    const intervals=[1,3,7,14,30];\n    const vocabulary=lang.vocabulary.map(v=>{\n      if(v.id!==id)return v;\n      const rc=(v.reviewCount||0)+(known?1:0);\n      const d=new Date(); d.setDate(d.getDate()+(known?intervals[Math.min(rc-1,intervals.length-1)]:1));\n      return {...v,reviewCount:rc,mastered:known&&rc>=4,nextReview:d.toISOString().split('T')[0]};\n    });\n    const xp=(lang.progress?.xp||0)+(known?10:2);\n    const nd={...this.state.data,language:{...lang,vocabulary,progress:{...lang.progress,xp,lastStudied:today}}};\n    this.setState({data:nd,flashFlipped:false,flashIdx:this.state.flashIdx+1}); this.save(nd);\n  }\n\n  \u002F\u002F Books\n  addBook() {\n    const {bookTitle,bookAuthor,bookStatus,data} = this.state;\n    if(!bookTitle.trim())return;\n    const b={id:Date.now()+'',title:bookTitle.trim(),author:bookAuthor.trim(),status:bookStatus,added:new Date().toISOString()};\n    const nd={...data,books:[...data.books,b]};\n    this.setState({data:nd,bookTitle:'',bookAuthor:'',bookShowForm:false}); this.save(nd);\n  }\n  cycleBook(id) {\n    const s=['to-read','reading','finished'];\n    const books=this.state.data.books.map(b=>b.id===id?{...b,status:s[(s.indexOf(b.status)+1
